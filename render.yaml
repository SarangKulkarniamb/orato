services:
  - type: web
    name: orato-backend
    runtime: python
    rootDir: orato-be
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10800
      - key: LLM_REASONING_ENABLED
        value: "true"
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_REASONING_EFFORT
        value: low
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai
      - key: LLM_TIMEOUT_SECONDS
        value: 8
      - key: MONGODB_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON_BASE64
        sync: false
      - key: GOOGLE_SEARCH_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_CX
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        sync: false
